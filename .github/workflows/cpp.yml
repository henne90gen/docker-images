name: cpp

on: push

jobs:
  clang:
    name: "Build and Upload Clang Image"
    runs-on: ubuntu-latest

    steps:
      - uses: extractions/setup-just@v4

      - name: Checkout code
        uses: actions/checkout@v2

      - name: docker login
        env:
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: docker login -u henne90gen -p $DOCKER_PASSWORD

      - name: Build Image
        run: just build-clang

      - name: Test Image
        run: just test-clang

      - name: Push Image
        run: just push-clang

  opengl:
    name: "Build and Upload OpenGL Image"
    runs-on: ubuntu-latest
    needs: clang

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: docker login
        env:
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: docker login -u henne90gen -p $DOCKER_PASSWORD

      - name: Build Image
        run: just build-opengl

      - name: Test Image
        run: just test-opengl

      - name: Push Image
        run: just push-opengl

  gtk:
    name: "Build and Upload GTK Image"
    runs-on: ubuntu-latest
    needs: clang

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: docker login
        env:
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: docker login -u henne90gen -p $DOCKER_PASSWORD

      - name: Build Image
        run: just build-gtk

      - name: Test Image
        run: just test-gtk

      - name: Push Image
        run: just push-gtk
